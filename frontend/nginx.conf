server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Android App Links & iOS Universal Links verification files
    location /.well-known/ {
        add_header Content-Type application/json;
        try_files $uri =404;
    }

    # Flutter web — serve index.html for all routes (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check — proxy to backend so /health returns real status
    location = /health {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Large file uploads (IPFS pin can take 20+ min)
        client_max_body_size 2g;
        proxy_read_timeout 1800s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 1800s;
    }

    # Proxy IPFS content through same origin (Filebase gateway).
    # video_player_web sets crossorigin="anonymous" on <video>, routing through
    # nginx makes it same-origin and avoids CORS failures on mobile browsers.
    location /ipfs/ {
        proxy_pass https://ipfs.filebase.io/ipfs/;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Host ipfs.filebase.io;
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        # Expose range response headers to the browser
        proxy_pass_header Accept-Ranges;
        proxy_pass_header Content-Range;
        # Stream directly to client — do not buffer into nginx memory
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}
