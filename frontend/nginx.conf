server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Flutter web — serve index.html for all routes (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check — proxy to backend so /health returns real status
    location = /health {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Large file uploads
        client_max_body_size 2g;
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Proxy IPFS content through same origin.
    # video_player_web sets crossorigin="anonymous" on <video>, so the browser
    # sends an Origin header to gateway.pinata.cloud. To avoid CORS failures on
    # mobile browsers we route /ipfs/* through nginx — making it same-origin.
    location /ipfs/ {
        proxy_pass https://gateway.pinata.cloud/ipfs/;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Host gateway.pinata.cloud;
        # Stream directly to client — do not buffer video into nginx memory
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}
