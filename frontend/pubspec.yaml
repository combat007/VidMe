name: vidmez
description: VidMez — A YouTube-like video sharing platform
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP client
  dio: ^5.4.0

  # State management
  provider: ^6.1.1

  # Secure token storage
  flutter_secure_storage: ^9.0.0

  # Video playback
  video_player: ^2.8.3

  # File picking
  file_picker: ^6.1.1

  # Image caching
  cached_network_image: ^3.3.1

  # Internationalization
  intl: ^0.19.0

  # Screen wake lock (prevent sleep during video playback)
  wakelock_plus: ^1.2.8

  # OAuth — Google Sign-In
  # Android: needs google-services.json + SHA-1 in Google Cloud Console
  # iOS: needs GoogleService-Info.plist + REVERSED_CLIENT_ID URL scheme
  # Web: needs GOOGLE_CLIENT_ID meta tag in index.html (added below)
  google_sign_in: ^6.2.1

  # OAuth — GitHub (browser-based flow, works on Android, iOS, Web)
  flutter_web_auth_2: ^4.0.0

  # Deep link handling — catches vidmez:// launch intent when OS killed app during OAuth
  app_links: ^6.0.0

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
