name: Build Mobile Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        working-directory: ./frontend
        run: flutter pub get

      - name: Setup Android wrapper (preserving custom Gradle config)
        working-directory: ./frontend
        run: |
          # Back up our custom Gradle config (flutter create will overwrite them)
          cp android/settings.gradle /tmp/settings.gradle.bak
          cp android/gradle/wrapper/gradle-wrapper.properties /tmp/gradle-wrapper.properties.bak
          # Generate gradle-wrapper.jar via flutter create
          flutter create --platforms=android . 2>/dev/null || true
          # Restore our AGP 8.7.0 / Kotlin 2.1.0 / Gradle 8.9 config
          cp /tmp/settings.gradle.bak android/settings.gradle
          cp /tmp/gradle-wrapper.properties.bak android/gradle/wrapper/gradle-wrapper.properties
          chmod +x android/gradlew

      - name: Write google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: printf '%s' "$GOOGLE_SERVICES_JSON" | base64 --decode > frontend/android/app/google-services.json

      - name: Write release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            mkdir -p frontend/android/keystore
            printf '%s' "$KEYSTORE_BASE64" | base64 --decode > frontend/android/keystore/release.jks
            cat > frontend/android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=../keystore/release.jks
          EOF
          fi

      - name: Build APK
        working-directory: ./frontend
        run: |
          flutter build apk --release \
            --dart-define=API_BASE_URL=${{ secrets.API_BASE_URL }} \
            --dart-define=GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vidmez-android-${{ github.sha }}
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  build-ios:
    name: Build iOS App
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: stable
          cache: true

      - name: Generate iOS platform (idempotent)
        working-directory: ./frontend
        run: flutter create --platforms ios . || true

      - name: Add iOS usage descriptions to Info.plist
        working-directory: ./frontend/ios/Runner
        run: |
          add_plist_key() {
            local key=$1 value=$2
            /usr/libexec/PlistBuddy -c "Add :$key string '$value'" Info.plist 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :$key '$value'" Info.plist
          }
          add_plist_key NSPhotoLibraryUsageDescription "VidMez needs access to your photo library to select videos."
          add_plist_key NSCameraUsageDescription "VidMez needs camera access to record videos."
          add_plist_key NSMicrophoneUsageDescription "VidMez needs microphone access to record audio with your videos."

      - name: Build iOS (no codesign)
        working-directory: ./frontend
        run: |
          flutter build ios --release --no-codesign \
            --dart-define=API_BASE_URL=${{ secrets.API_BASE_URL }} \
            --dart-define=GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}

      - name: Package Runner.app as zip
        run: |
          cd frontend/build/ios/iphoneos
          zip -r vidmez-ios.zip Runner.app

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: vidmez-ios-${{ github.sha }}
          path: frontend/build/ios/iphoneos/vidmez-ios.zip
          retention-days: 30
